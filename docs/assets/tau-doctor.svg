<svg width="900" height="330" viewBox="0 0 900 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">tau doctor terminal output</title>
  <desc id="desc">Terminal screenshot showing tau doctor health checks.</desc>
  <rect width="900" height="330" rx="10" fill="#111318"/>
  <rect x="0" y="0" width="900" height="42" rx="10" fill="#1d2028"/>
  <circle cx="24" cy="21" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="21" r="6" fill="#febc2e"/>
  <circle cx="64" cy="21" r="6" fill="#28c840"/>
  <text x="92" y="27" font-family="Menlo, Consolas, monospace" font-size="14" fill="#c9d1d9">tau doctor</text>
  <text x="30" y="78" font-family="Menlo, Consolas, monospace" font-size="16" fill="#8b949e">$ tau doctor</text>
  <text x="30" y="112" font-family="Menlo, Consolas, monospace" font-size="16" fill="#7ee787">[ok]</text>
  <text x="92" y="112" font-family="Menlo, Consolas, monospace" font-size="16" fill="#e6edf3">node: 26.2.0</text>
  <text x="30" y="142" font-family="Menlo, Consolas, monospace" font-size="16" fill="#7ee787">[ok]</text>
  <text x="92" y="142" font-family="Menlo, Consolas, monospace" font-size="16" fill="#e6edf3">pi: 0.75.5</text>
  <text x="30" y="172" font-family="Menlo, Consolas, monospace" font-size="16" fill="#d29922">[skip]</text>
  <text x="92" y="172" font-family="Menlo, Consolas, monospace" font-size="16" fill="#e6edf3">tmux extended-keys: not inside tmux</text>
  <text x="30" y="202" font-family="Menlo, Consolas, monospace" font-size="16" fill="#7ee787">[ok]</text>
  <text x="92" y="202" font-family="Menlo, Consolas, monospace" font-size="16" fill="#e6edf3">settings: ~/.pi/agent/settings.json</text>
  <text x="30" y="232" font-family="Menlo, Consolas, monospace" font-size="16" fill="#7ee787">[ok]</text>
  <text x="92" y="232" font-family="Menlo, Consolas, monospace" font-size="16" fill="#e6edf3">sessions: ~/.pi/tau/sessions</text>
  <text x="30" y="262" font-family="Menlo, Consolas, monospace" font-size="16" fill="#d29922">[warn]</text>
  <text x="92" y="262" font-family="Menlo, Consolas, monospace" font-size="16" fill="#e6edf3">key github-copilot: missing</text>
  <text x="30" y="292" font-family="Menlo, Consolas, monospace" font-size="16" fill="#7ee787">[ok]</text>
  <text x="92" y="292" font-family="Menlo, Consolas, monospace" font-size="16" fill="#e6edf3">key openai-codex: tokenless/login mode</text>
</svg>
